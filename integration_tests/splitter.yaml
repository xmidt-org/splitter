---
# Complete integration test configuration

servers((replace)):
  health:
    http:
      address: ":0"  # Dynamic port to avoid conflicts
    path: /health

  metrics:
    http:
      address: ":0"  # Dynamic port to avoid conflicts
    path: /metrics

  pprof:
    http:
      address: ":0"  # Dynamic port to avoid conflicts
    path: /debug/pprof/

producer((replace)):
  brokers:
    restart_on_config_change: true
    target_region: local
    regions:
      local:
        - "${KAFKA_BROKERS}"
  topic_routes:
    - pattern: "*"
      topic: "default-events"
      hash_key: "source"  # Extract device ID from source field
    - pattern: "device-status"
      topic: "device-status-events"
      hash_key: "source"  # Extract device ID from source field

buckets:
  possible_buckets:
    - name: "bucket-0"
      threshold: 1.0
  target_bucket: "bucket-0"
  partition_key_type: "source"  # Extract device ID from source field for partitioning
  missing_partition_key_action: "include"

consumer((replace)):
  brokers:
    - "${KAFKA_BROKERS}"
  topics:
    - "wrp-events"
  group_id: "splitter-test"
